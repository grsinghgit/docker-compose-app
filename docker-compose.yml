version: '3.8'

services:
  # ---- Web App Service ----
  web:
    build: ./web      # web फ़ोल्डर में मौजूद Dockerfile से Build करें
    ports:
      - "8080:5000"   # Host Port 8080 -> Container Port 5000
    environment:
      MYSQL_PASSWORD: secret
    depends_on:
      - db            # Web, 'db' के Start होने का इंतज़ार करेगा

  # ---- Database Service ----
  db:
    image: mysql:5.7
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: mydb
    volumes:
      - db_data:/var/lib/mysql   # डेटा को सुरक्षित रखें
    ports:
      - "3306:3306"   # (वैकल्पिक) Host से DB को Access करना हो तो

volumes:
  db_data:    # यह Volume Data को स्टोर करेगा