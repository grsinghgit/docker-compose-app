name: Docker Security Scan

on:
  push:
    branches: [ main, hardened ]
  pull_request:
    branches: [ main, hardened ]

jobs:
  security-scan:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        run: |
          docker compose build

      - name: List Docker Images (Debug)
        run: |
          docker images

      - name: Save Docker Image
        run: |
          docker tag compose-app-web:latest compose-app-web:latest
          docker save compose-app-web:latest -o compose-app-web.tar

      - name: Run Trivy Scan
        continue-on-error: true
        run: |
          docker run --rm \
            -v $(pwd):/data \
            aquasecurity/trivy:latest \
            image --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --input /data/compose-app-web.tar > trivy-output.txt 2>&1

      - name: Upload Scan Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-report
          path: trivy-output.txt